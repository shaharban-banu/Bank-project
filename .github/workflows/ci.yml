# This workflow will install Python dependencies, run tests and lint with a single version of Python
# For more information see: https://docs.github.com/en/actions/automating-builds-and-tests/building-and-testing-python

name: Bank project CI pipeline
on:
  push:
    branches: [ "main" ]
  pull_request:
    branches: [ "main" ]

permissions:
  contents: read

jobs:
  build:

    runs-on: ubuntu-latest

    steps:
    - uses: actions/checkout@v4
    - name: Set up Python 3.10
      uses: actions/setup-python@v3
      with:
        python-version: "3.10"
    - name: Install dependencies
      run: |
         pip install -r requirements.txt
    - name : Run pylint
      run : |
        pylint bank.py
    - name: Test with pytest
      run: |
        pytest
    - name: Build Docker Image
      run: |
          docker build -t bank-project .

    - name: Deploy to AWS EC2

      uses: appleboy/ssh-action@master

      with:
          host: ${{ secrets.AWS_HOST }}
          username: ${{ secrets.AWS_USER }}
          key: ${{ secrets.AWS_KEY }}

          script: |

            sudo docker stop bank-api || true
            sudo docker rm bank-api || true

            sudo docker pull python:3.10

            cd /home/ubuntu

            rm -rf bank_project

            git clone https://github.com/shaharban-banu/Bank-project.git bank_project

            cd bank_project

            sudo docker build -t bank-project .

            sudo docker run -d -p 8000:8000 --name bank-api bank-project